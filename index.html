<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>First100 - powered by Trotify</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <header class="topbar">
      <div>
        <h1>First100 - powered by Trotify</h1>
        <div class="topbar-sub">Early-speed visual for mobile-start harness races</div>
      </div>
    </header>

    <main class="content">
      <section class="panel">
        <div class="panel-header">
          <h2>Filters</h2>
        </div>

        <div class="filters-grid">
          <div class="filter-block">
            <label>State</label>
            <div id="stateTabs" class="state-tabs"></div>
          </div>

          <div class="filter-block">
            <label>Meeting</label>
            <select id="meetingSelect"></select>
          </div>

          <div class="filter-block">
            <label>Race</label>
            <div id="raceTabs" class="race-tabs"></div>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <div id="raceTitle" class="subtitle">Loading...</div>

          <div id="distanceTabs" class="metric-tabs">
            <button type="button" class="distance-tab metric-tab" data-distance="50">50m</button>
            <button type="button" class="distance-tab metric-tab active" data-distance="100">100m</button>
            <button type="button" class="distance-tab metric-tab" data-distance="200">200m</button>
          </div>

          <div id="metricTabs" class="metric-tabs">
            <button type="button" class="metric-tab active" data-metric="weighted">Weighted</button>
            <button type="button" class="metric-tab" data-metric="med">Median</button>
            <button type="button" class="metric-tab" data-metric="fast">Fastest</button>
            <button type="button" class="metric-tab" data-metric="avg123">Avg FR1-3</button>
            <button type="button" class="metric-tab" data-metric="last5">Last 5</button>
            <button type="button" class="metric-tab" data-metric="avg">Average</button>
          </div>
        </div>

        <div id="mapContainer">
          <div class="empty">(loading)</div>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
